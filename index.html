<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f6f7f9">
  <meta name="description" content="上場企業100社からランダムに1社の公式サイトへ移動するアプリ">
  <title>CORP DIVE</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="stage" id="stage" aria-labelledby="app-title">
      <header class="top">
        <div>
          <p class="eyebrow">JP LISTED RANDOMIZER</p>
          <h1 id="app-title">CORP DIVE</h1>
        </div>
        <div class="progress" aria-label="訪問した企業数">
          <span id="count">0 / 100</span>
          <span>visited</span>
        </div>
      </header>

      <section class="console" aria-live="polite">
        <p class="status" id="status">READY</p>
        <div class="selection" id="target">
          <span class="selection-label">選択された企業</span>
          <strong id="target-name">未選択</strong>
          <span id="target-sector">プレビューすると企業情報が表示されます</span>
        </div>
        <button class="go" id="go" type="button">ランダムに移動</button>
        <button class="preview" id="preview" type="button">まず企業を見る</button>
      </section>

      <footer class="bottom">
        <span>前回の企業</span>
        <strong class="last" id="last">なし</strong>
      </footer>
    </section>
  </main>
  <script src="companies.js"></script>
  <script src="app.js"></script>
</body>
</html>
