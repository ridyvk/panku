<!doctype html>
<html lang='ja'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'>
<meta name='theme-color' content='#030503'>
<meta name='description' content='上場企業100社からランダムに1社の公式ホームページへ飛ぶアプリ'>
<title>CORP DIVE</title>
<link rel='manifest' href='manifest.webmanifest'>
<link rel='icon' href='assets/icons/icon.svg' type='image/svg+xml'>
<link rel='stylesheet' href='style.css'>
<style>
.bg-art{inset:auto!important;left:-74px!important;top:84px!important;width:365px!important;height:146px!important;border:1px solid rgba(122,78,180,.18);border-radius:8px;opacity:.68!important;background-size:cover!important;background-position:center center!important;filter:contrast(1.12) saturate(1.08) drop-shadow(0 0 22px rgba(90,35,155,.24))!important;transform:rotate(-4deg) scale(1)!important;mix-blend-mode:screen}
.bg-art:after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.18),rgba(0,0,0,.04),rgba(0,0,0,.35));pointer-events:none}
.stage.is-diving .bg-art{filter:contrast(1.28) brightness(1.18) saturate(1.18) drop-shadow(0 0 26px rgba(115,255,114,.2))!important;transform:rotate(-4deg) scale(.92)!important;opacity:.2!important;transition:.35s}
@media(max-height:680px){.bg-art{top:70px!important;width:315px!important;height:126px!important}}
</style>
</head>
<body>
<main class='app'>
  <div class='noise' aria-hidden='true'></div>
  <div class='scan' aria-hidden='true'></div>
  <section class='stage' id='stage'>
    <div class='bg-art' aria-hidden='true'></div>
    <div class='top'>
      <div><p class='eyebrow'>JP LISTED RANDOMIZER</p><h1>CORP DIVE</h1></div>
      <div class='count' id='count'>0 / 100</div>
    </div>
    <div class='orbit' id='orbit' aria-hidden='true'></div>
    <section class='console'>
      <div>
        <p class='status' id='status'>PRESS TO ENTER</p>
        <button class='go' id='go' type='button' aria-label='ランダムで企業の公式サイトを開く'>GO</button>
        <p class='target' id='target'>未選択</p>
        <p class='hint'>上場企業100社からランダム選定 → 公式HPへ移動</p>
      </div>
    </section>
    <section class='bottom'>
      <div><div>LAST TARGET</div><div class='last' id='last'>NONE</div></div>
      <button class='preview' id='preview' type='button'>PREVIEW</button>
    </section>
  </section>
</main>
<script src='companies.js'></script>
<script src='app.js'></script>
<script src='effects.js'></script>
</body>
</html>
